services:
  - type: web
    name: expense-tracker-backend
    runtime: python
    buildCommand: pip install -r Backend/requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker Backend.main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./expense_tracker.db
      - key: PYTHON_VERSION
        value: 3.10.0
