databases:
  - name: expensedb
    plan: free

services:
  - type: web
    name: expense-tracker-backend
    runtime: python
    buildCommand: pip install -r Backend/requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker Backend.main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: expensedb
          property: connectionString
      - key: PYTHONPATH
        value: Backend
      - key: PYTHON_VERSION
        value: 3.10.0
